<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Chat</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .user {
      align-self: flex-end;
      background: #0084ff;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid #ddd;
      border-bottom-left-radius: 4px;
    }
    #input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 12px;
    }
    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
      resize: none;
    }
    #send {
      padding: 12px 24px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 24px;
      font-weight: 600;
      cursor: pointer;
    }
    #send:hover { background: #0066cc; }
    #send:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask anything..."></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Your OpenAI API key is inserted here
    const API_KEY = "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";

    const API_URL = "https://api.openai.com/v1/chat/completions";
    const MODEL = "gpt-4o-mini";   // fast & capable — change to "gpt-4o" for better answers if needed

    let messages = [
      { role: "system", content: "You are a helpful and concise assistant. Answer directly, especially good at math and calculations." }
    ];

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;

      messages.push({ role: "user", content: text });

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messages,
            temperature: 0.7,
            max_tokens: 2000
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || "API error — check your key or credits");
        }

        const data = await res.json();
        const reply = data.choices[0].message.content.trim();

        addMessage(reply, "assistant");
        messages.push({ role: "assistant", content: reply });

      } catch (err) {
        addMessage("Error: " + err.message + "\n(Check console for details)", "assistant");
      }

      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.onclick = sendMessage;

    input.onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = (input.scrollHeight) + "px";
    });
  </script>
</body>
</html>
