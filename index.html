<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rayy AI Chat</title>
<style>
  body {
    background-image: url(https://media1.tenor.com/m/6ZUs587t-_YAAAAC/blue-heart-black.gif);
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    font-family: "Syne", sans-serif;
    position: relative;
    color: white;
    text-align: center;
    padding-top: 50px;
  }

  .container {
    text-align: center;
    margin: auto;
  }

  .image-container img {
    height: 150px;
    border-radius: 50%;
    margin-bottom: 10px;
  }

  .links-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 10px;
  }

  .link, .hundo-btn {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  .link {
    background-color: #f5e79d;
    color: #111;
  }

  .link:hover {
    background-color: #ffeaa3;
  }

  .hundo-btn {
    background-color: #ff4081;
    color: white;
  }

  .hundo-btn:hover {
    background-color: #e91e63;
  }

  /* Chat popup doubled size */
  .chat-popup {
    display: none;
    position: fixed;
    bottom: 50px;
    right: 50px;
    border: 2px solid #ff4081;
    border-radius: 10px;
    background-color: #222;
    width: 600px; /* double size */
    height: 500px; /* taller */
    padding: 15px;
    z-index: 999;
    display: flex;
    flex-direction: column;
  }

  .chat-log {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
    text-align: left;
  }

  .chat-log p { margin: 5px 0; }

  .chat-log .user { color: #ff4081; }
  .chat-log .ai { color: #00ffcc; }

  .chat-input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: calc(100% - 10px);
    margin-bottom: 5px;
  }

  .send-btn {
    padding: 10px;
    border-radius: 5px;
    border: none;
    background-color: #00ffcc;
    color: #111;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">
  <div class="image-container">
    <img src="https://i.pinimg.com/736x/f4/b3/f8/f4b3f8737377dab4651be803d3975cd4.jpg" alt="Profile Picture" />
    <p class="w3-large"><strong>MADE BY RAYY</strong></p>

    <div class="links-container">
      <a href="https://rayzshopp.mysellix.io/" class="link" target="_blank">Shop</a>
      <button class="hundo-btn" onclick="openChat()">Hundo</button>
    </div>
  </div>
</div>

<div class="chat-popup" id="chatPopup">
  <div class="chat-log" id="chatLog"></div>
  <input type="text" id="chatInput" class="chat-input" placeholder="Type your question..." />
  <button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
function openChat() {
  document.getElementById("chatPopup").style.display = "flex";
}

// === REAL AI CHAT ===
// Replace YOUR_OPENAI_API_KEY with your key from https://platform.openai.com/account/api-keys
const API_KEY = "YOUR_OPENAI_API_KEY";

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const log = document.getElementById("chatLog");
  const userMsg = input.value.trim();
  if (!userMsg) return;

  // Show user message
  const pUser = document.createElement("p");
  pUser.classList.add("user");
  pUser.textContent = "You: " + userMsg;
  log.appendChild(pUser);
  input.value = "";
  log.scrollTop = log.scrollHeight;

  // Call OpenAI API
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-3.5-turbo",
      messages: [{role: "user", content: userMsg}],
      max_tokens: 150
    })
  });

  const data = await response.json();
  const aiText = data.choices[0].message.content;

  // Show AI response
  const pAI = document.createElement("p");
  pAI.classList.add("ai");
  pAI.textContent = "AI: " + aiText;
  log.appendChild(pAI);
  log.scrollTop = log.scrollHeight;
}
</script>

</body>
</html>
