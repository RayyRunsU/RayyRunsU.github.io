<!DOCTYPE html>
<html>
<head>
  <title>Tiny AI Chat</title>
</head>
<body>
  <h2>Tiny AI Chat</h2>
  <input type="text" id="userInput" placeholder="Ask me anything...">
  <button onclick="chat()">Send</button>
  <div id="chatBox"></div>

  <script>
    function chat() {
      const input = document.getElementById('userInput').value;
      const chatBox = document.getElementById('chatBox');
      let response = "";

      // super tiny "AI" logic
      if(input.includes("5 plus 5")) {
        response = "5 + 5 = 10";
      } else if(input.toLowerCase().includes("hey")) {
        response = "Hey! How’s it going?";
      } else {
        response = "Sorry, I can't answer that yet.";
      }

      chatBox.innerHTML += `<p><b>You:</b> ${input}</p>`;
      chatBox.innerHTML += `<p><b>Tiny AI:</b> ${response}</p>`;
      document.getElementById('userInput').value = "";
    }
  </script>
</body>
</html>
