<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Syne"/>
<title>Links website</title>
<style>
  body {
    background-image: url(https://media1.tenor.com/m/6ZUs587t-_YAAAAC/blue-heart-black.gif);
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    font-family: "Syne", sans-serif;
    position: relative;
  }

  .container {
    width: 100%;
    padding: 15px;
    margin: auto;
  }

  .image-container {
    text-align: center;
    width: 100%;
  }

  .links-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .link {
    min-width: auto !important;
    padding-left: 25px;
    padding-right: 25px;
    font-size: 18px;
  }

  .w3-yellow,
  .w3-hover-purple:hover,
  .w3-text-black {
    color: rgba(255, 204, 217) !important;
    background-color: rgba(255, 255, 179, 0.3) !important;
  }
</style>
</head>

<body class="w3-white">

<div class="container">
  <div class="image-container">

    <!-- NEW PROFILE PICTURE -->
    <img
      src="https://i.pinimg.com/originals/placeholder.png"  <!-- replace this with your new image URL -->
      class="w3-margin"
      alt="Profile Picture"
      height="150px"
      style="border-radius: 50%"
    />

    <div class="w3-text-white">
      <p class="w3-large"><strong>MADE BY RAYY</strong></p>
    </div>

    <div class="links-container">
      <a href="https://rayzshopp.mysellix.io/" 
         class="w3-button w3-hover-pink w3-large w3-round-xlarge w3-yellow link" 
         target="_blank">
         Shop
      </a>
    </div>
  </div>
</div>

</body>
</html>
