<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tiny AI Chat</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    #chat { background: #fff; padding: 10px; border: 1px solid #ccc; height: 300px; overflow-y: auto; }
    #userInput { width: 70%; padding: 5px; }
    #sendBtn { padding: 5px 10px; }
    .user { color: blue; margin: 5px 0; }
    .ai { color: green; margin: 5px 0; }
  </style>
</head>
<body>

<h2>Tiny AI Chat</h2>
<div id="chat"></div>
<input id="userInput" type="text" placeholder="Type something...">
<button id="sendBtn">Send</button>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');

  function addMessage(sender, text) {
    const p = document.createElement('p');
    p.className = sender;
    p.textContent = text;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage(msg) {
    try {
      const response = await fetch('http://localhost:3000/chat', {  // replace 3000 if your server uses another port
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await response.json();
      addMessage('ai', data.reply || 'No reply');
    } catch (err) {
      addMessage('ai', 'Error: ' + err.message);
    }
  }

  btn.addEventListener('click', () => {
    const msg = input.value.trim();
    if(!msg) return;
    addMessage('user', msg);
    sendMessage(msg);
    input.value = '';
  });

  input.addEventListener('keypress', e => {
    if(e.key === 'Enter') btn.click();
  });
</script>

</body>
</html>
